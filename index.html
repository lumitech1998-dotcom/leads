<!DOCTYPE html>
<html>
<head>
  <title>Pro Admin Deals Platform</title>
  <style>
    body { font-family: Arial; background:#f5f5f5; text-align:center; }
    .box { background:white; padding:20px; margin:20px; border-radius:10px; }
    button { padding:8px 15px; background:black; color:white; border:none; margin:3px; }
    input { padding:8px; margin:5px; }
  </style>
</head>

<body>

<h1>🔥 Deals Marketplace PRO</h1>

<div class="box">
  <h2>Login</h2>
  <input type="text" id="username" placeholder="Name"><br>
  <input type="password" id="password" placeholder="Password"><br>
  <button onclick="login()">Enter</button>
</div>

<div class="box">
  <h2>Post Deal</h2>
  <input type="text" id="dealTitle" placeholder="Deal Title"><br>
  <input type="number" id="dealAmount" placeholder="Deal Amount (₹)"><br>
  <button onclick="postDeal()">Post Deal</button>
</div>

<div class="box">
  <h2>Deals</h2>
  <div id="deals"></div>
</div>

<div class="box" id="adminPanel" style="display:none;">
  <h2>👑 Admin Panel</h2>
  <button onclick="showAll()">All Deals</button>
  <button onclick="showBig()">💰 Big Deals (1Cr+)</button>
  <div id="adminData"></div>
</div>

<script>
let deals = JSON.parse(localStorage.getItem("deals")) || [];
let user = "";
let isAdmin = false;

// 🔐 CHANGE THIS PASSWORD
const ADMIN_PASSWORD = "1234";

function login() {
  user = document.getElementById("username").value;
  let pass = document.getElementById("password").value;

  if(user == "") {
    alert("Enter name");
    return;
  }

  // Admin check
  if(user.toLowerCase() == "admin" && pass == ADMIN_PASSWORD) {
    isAdmin = true;
    document.getElementById("adminPanel").style.display = "block";
    alert("👑 Admin Access Granted");
    showAll();
  } else {
    alert("User Login Successful");
  }
}

function postDeal() {
  if(user == "") {
    alert("Login first");
    return;
  }

  let title = document.getElementById("dealTitle").value;
  let amount = parseInt(document.getElementById("dealAmount").value);

  if(title == "" || !amount) {
    alert("Fill all fields");
    return;
  }

  let deal = {
    user: user,
    title: title,
    amount: amount,
    enquiries: 0
  };

  deals.push(deal);
  localStorage.setItem("deals", JSON.stringify(deals));
  showDeals();
}

function enquiry(index) {
  deals[index].enquiries++;

  if(deals[index].enquiries >= 10) {
    alert("🔒 Subscription Required");
    return;
  }

  localStorage.setItem("deals", JSON.stringify(deals));
  showDeals();
}

function deleteDeal(index) {
  if(!isAdmin) return;

  deals.splice(index, 1);
  localStorage.setItem("deals", JSON.stringify(deals));
  showDeals();
  showAll();
}

function showDeals() {
  let output = "";

  deals.forEach((d, i) => {
    output += `
      <div style="margin:10px;padding:10px;border:1px solid #ccc">
        <b>${d.title}</b><br>
        ₹${d.amount}<br>
        By: ${d.user}<br>
        Enquiries: ${d.enquiries}<br>
        <button onclick="enquiry(${i})">Enquire</button>
      </div>
    `;
  });

  document.getElementById("deals").innerHTML = output;
}

function showAll() {
  let data = "";

  deals.forEach((d, i) => {
    data += `
      <div style="border:1px solid black; margin:5px; padding:5px;">
        👤 ${d.user} | 💰 ₹${d.amount} | 📊 ${d.enquiries}
        <br><button onclick="deleteDeal(${i})">❌ Delete</button>
      </div>
    `;
  });

  document.getElementById("adminData").innerHTML = data;
}

function showBig() {
  let data = "";

  deals.forEach((d, i) => {
    if(d.amount >= 10000000) {
      data += `
        <div style="border:2px solid red; margin:5px; padding:5px;">
          🔥 BIG: ${d.user} | ₹${d.amount}
        </div>
      `;
    }
  });

  document.getElementById("adminData").innerHTML = data;
}

showDeals();
</script>

</body>
</html>
