<!DOCTYPE html>
<html>
<head>
  <title>Deals Platform</title>
  <style>
    body { font-family: Arial; text-align:center; }
    #content, #chatBox { display:none; margin-top:20px; }
    button { padding:10px; margin:5px; }
    input { padding:8px; margin:5px; }
  </style>
</head>

<body>

<h1>🔥 Deals Platform</h1>

<!-- LOCK SCREEN -->
<div id="lock">
  <h2>🔒 Pay ₹1 to Unlock Leads</h2>
  <button onclick="upiPay()">📲 Pay Now</button><br>
  <input type="text" id="txn" placeholder="Enter Transaction ID">
  <button onclick="unlock()">Submit</button>
</div>

<!-- MAIN CONTENT -->
<div id="content">
  <h2>🔥 Premium Leads</h2>

  <div onclick="openLead()">👉 Solar Project - 50KW</div>
  <div onclick="openLead()">👉 Battery Order - 200Ah</div>
  <div onclick="openLead()">👉 Investor Required - 1CR</div>

  <p id="limitMsg"></p>

  <!-- CHAT -->
  <div id="chatBox">
    <h3>💬 Chat</h3>
    <div id="messages"></div>
    <input type="text" id="msg" placeholder="Type message">
    <button onclick="sendMsg()">Send</button>
  </div>
</div>

<script>

// UPI PAYMENT
function upiPay(){
  window.location.href="upi://pay?pa=yourupi@okaxis&pn=Deals&am=1&cu=INR";
}

// UNLOCK SYSTEM
function unlock(){
  let txn = document.getElementById("txn").value;
  if(txn.length > 5){
    document.getElementById("lock").style.display="none";
    document.getElementById("content").style.display="block";
    localStorage.setItem("paid","yes");
    localStorage.setItem("lastLogin", Date.now());
  } else {
    alert("Enter valid Transaction ID");
  }
}

// AUTO LOGIN CHECK
if(localStorage.getItem("paid") === "yes"){
  document.getElementById("lock").style.display="none";
  document.getElementById("content").style.display="block";
}

// LEADS LIMIT
let leadsUsed = localStorage.getItem("leads") || 0;

function openLead(){
  leadsUsed++;
  localStorage.setItem("leads", leadsUsed);

  if(leadsUsed >= 5){
    document.getElementById("limitMsg").innerText="⚠️ Limit reached. Upgrade required.";
  }

  document.getElementById("chatBox").style.display="block";
}

// CHAT SYSTEM
function sendMsg(){
  let msg = document.getElementById("msg").value;
  let box = document.getElementById("messages");
  box.innerHTML += "<p>🧑: "+msg+"</p>";
  document.getElementById("msg").value="";
}

// INACTIVE SYSTEM
let last = localStorage.getItem("lastLogin");
let now = Date.now();

if(last){
  let diff = (now - last) / (1000*60*60*24);

  if(diff > 7 && !localStorage.getItem("extended")){
    alert("⚠️ 3 Days Extension Given");
    localStorage.setItem("extended","yes");
  }

  if(diff > 10 && localStorage.getItem("extended")){
    document.body.innerHTML="<h1>❌ Account Blocked</h1>";
  }
}

// NOTIFICATION
if(Notification.permission !== "granted"){
  Notification.requestPermission();
}

if(last){
  let diff = (now - last) / (1000*60*60*24);
  if(diff > 7){
    new Notification("⚡ Come Back!", {
      body:"Your account inactive. Login now!"
    });
  }
}

</script>

</body>
</html>
