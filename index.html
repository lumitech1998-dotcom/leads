<!DOCTYPE html>
<html>
<head>
  <title>Deals Platform PRO</title>
  <style>
    body { font-family: Arial; background:#f5f5f5; text-align:center; }
    .box { background:white; padding:20px; margin:20px; border-radius:10px; }
    button { padding:10px 20px; background:black; color:white; border:none; }
  </style>
</head>

<body>

<h1>🔥 Deals Marketplace PRO</h1>

<div class="box">
  <h2>Enter Your Name</h2>
  <input type="text" id="username" placeholder="Your Name"><br><br>
  <button onclick="saveUser()">Start</button>
</div>

<div class="box">
  <h2>Post Deal</h2>
  <input type="text" id="dealTitle" placeholder="Deal Title"><br><br>
  <input type="number" id="dealAmount" placeholder="Deal Amount (₹)"><br><br>
  <button onclick="postDeal()">Post Deal</button>
</div>

<div class="box">
  <h2>Deals</h2>
  <div id="deals"></div>
</div>

<script>
let deals = JSON.parse(localStorage.getItem("deals")) || [];
let user = localStorage.getItem("user") || "";

function saveUser() {
  user = document.getElementById("username").value;
  localStorage.setItem("user", user);
  alert("Welcome " + user);
}

function postDeal() {
  if(user == "") {
    alert("Enter your name first");
    return;
  }

  let title = document.getElementById("dealTitle").value;
  let amount = parseInt(document.getElementById("dealAmount").value);

  if(title == "" || !amount) {
    alert("Fill all fields");
    return;
  }

  let deal = {
    user: user,
    title: title,
    amount: amount,
    enquiries: 0,
    createdAt: new Date().getTime()
  };

  deals.push(deal);
  localStorage.setItem("deals", JSON.stringify(deals));
  showDeals();
}

function enquiry(index) {
  let deal = deals[index];

  deal.enquiries++;

  // 🔥 TRACK BIG DEAL USERS
  if(deal.amount >= 10000000) {
    alert("🔥 Big Deal User Detected (1Cr+)");
    console.log("BIG USER:", deal.user);
  }

  // 🔒 LOCK AFTER 10
  if(deal.enquiries >= 10) {
    alert("🔒 Subscription Required Now");
    return;
  }

  localStorage.setItem("deals", JSON.stringify(deals));
  showDeals();
}

function showDeals() {
  let output = "";

  deals.forEach((d, i) => {
    output += `
      <div style="margin:10px;padding:10px;border:1px solid #ccc">
        <b>${d.title}</b><br>
        ₹${d.amount}<br>
        By: ${d.user}<br>
        Enquiries: ${d.enquiries}<br>
        <button onclick="enquiry(${i})">Enquire</button>
      </div>
    `;
  });

  document.getElementById("deals").innerHTML = output;
}

showDeals();
</script>

</body>
</html>
