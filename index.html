<!DOCTYPE html>
<html>
<head>
  <title>Deals Platform</title>
  <style>
    body { font-family: Arial; background:#f5f5f5; text-align:center; }
    .box { background:white; padding:20px; margin:20px; border-radius:10px; }
    button { padding:10px 20px; background:black; color:white; border:none; }
  </style>
</head>

<body>

<h1>🔥 Smart Deals Marketplace</h1>

<div class="box">
  <h2>Post Deal</h2>
  <input type="text" id="dealTitle" placeholder="Deal Title"><br><br>
  <input type="number" id="dealAmount" placeholder="Deal Amount (₹)"><br><br>
  <button onclick="postDeal()">Post Deal</button>
</div>

<div class="box">
  <h2>Deals</h2>
  <div id="deals"></div>
</div>

<script>
let deals = [];

function postDeal() {
  let title = document.getElementById("dealTitle").value;
  let amount = parseInt(document.getElementById("dealAmount").value);

  if(title == "" || !amount) {
    alert("Fill all fields");
    return;
  }

  let deal = {
    title: title,
    amount: amount,
    enquiries: 0,
    locked: false,
    freeAccess: true,
    createdAt: new Date().getTime()
  };

  deals.push(deal);
  showDeals();
}

function enquiry(index) {
  let deal = deals[index];

  // 1️⃣ 1 week free access
  let now = new Date().getTime();
  let oneWeek = 7 * 24 * 60 * 60 * 1000;

  if(now - deal.createdAt > oneWeek) {
    deal.freeAccess = false;
  }

  // 2️⃣ lock after 10 enquiries
  if(deal.enquiries >= 10) {
    deal.locked = true;
  }

  // 3️⃣ Big deal logic (>2 lakh)
  if(deal.amount > 200000 && !deal.freeAccess) {
    alert("🔒 Subscription Required for Big Deal");
    return;
  }

  if(deal.locked) {
    alert("🔒 Deal Locked");
    return;
  }

  deal.enquiries++;
  showDeals();
}

function showDeals() {
  let output = "";

  deals.forEach((d, i) => {

    let status = "";

    if(d.amount > 200000) {
      status += "💰 High Value Deal<br>";
    }

    if(d.locked) {
      status += "🔒 Locked<br>";
    }

    output += `
      <div style="margin:10px;padding:10px;border:1px solid #ccc">
        <b>${d.title}</b><br>
        ₹${d.amount}<br>
        Enquiries: ${d.enquiries}<br>
        ${status}
        <button onclick="enquiry(${i})">Enquire</button>
      </div>
    `;
  });

  document.getElementById("deals").innerHTML = output;
}
</script>

</body>
</html>
